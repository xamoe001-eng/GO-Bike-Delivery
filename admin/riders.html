<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rider Management — GO Bike Delivery Admin</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">Rider Management</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen">
    <div class="grid-2 mb-16">
      <div class="stat"><div class="stat__value" id="onlineCount">0</div><div class="stat__label">Online now</div></div>
      <div class="stat"><div class="stat__value" id="totalCount">0</div><div class="stat__label">Total riders</div></div>
    </div>
    <div class="stack" id="list"></div>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink active" href="riders.html" data-page="riders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M5.5 17.5 9 9h4l2.5 4.5"/></svg>Riders</a>
    <a class="navlink" href="rates.html" data-page="rates.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2v20M17 6H9.5a3 3 0 0 0 0 6h5a3 3 0 0 1 0 6H6"/></svg>Rates</a>
    <a class="navlink" href="more.html" data-page="more.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>More</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  UI.requireAuth('admin');
  UI.markActiveNav();

  (async function () {
    const riders = await Store.listRiders();
    document.getElementById('onlineCount').textContent = riders.filter(r => r.status === 'online').length;
    document.getElementById('totalCount').textContent = riders.length;

    document.getElementById('list').innerHTML = riders.length ? riders.map(r => `
      <div class="card row" style="gap:14px;">
        <div class="avatar-fallback" style="width:48px;height:48px;font-size:16px;">${r.name.split(' ').map(p=>p[0]).slice(0,2).join('')}</div>
        <div style="flex:1;">
          <div class="row-between">
            <span style="font-weight:700;">${r.name}</span>
            <span class="badge ${r.status === 'online' ? 'badge-delivered' : 'badge-cancelled'}">${r.status === 'online' ? 'Online' : 'Offline'}</span>
          </div>
          <div class="muted" style="font-size:12.5px;">${r.vehicle || 'Motorbike'} · ${r.plate || '—'}</div>
          <div class="row mt-8" style="gap:14px;">
            <span class="muted" style="font-size:12px;">★ ${r.rating.toFixed(1)}</span>
            <span class="muted" style="font-size:12px;">${r.totalDeliveries} deliveries</span>
            <span class="muted" style="font-size:12px;">${r.weekEarnings.toLocaleString()} MMK/wk</span>
          </div>
        </div>
      </div>`).join('') : `<div class="empty"><p class="muted">No riders registered yet.</p></div>`;
  })();
</script>
</body>
</html>
