<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>More — GO Bike Delivery Admin</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">More</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen">
    <div class="card center" style="flex-direction:column;padding:24px;margin-bottom:18px;">
      <div id="avatarBox" class="avatar" style="width:60px;height:60px;font-size:22px;margin-bottom:10px;"></div>
      <div class="h3" id="pName">Admin</div>
      <span class="pill-tag mt-8">Administrator</span>
    </div>

    <div class="stack" style="gap:10px;">
      <a href="customers.html" class="role-card">
        <div class="role-card__icon" style="background:linear-gradient(135deg,var(--orange-400),var(--orange-700));"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg></div>
        <div class="role-card__text"><h3>Customer Management</h3><p>View and manage registered customers</p></div>
        <svg class="role-card__arrow" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a href="reports.html" class="role-card">
        <div class="role-card__icon" style="background:linear-gradient(135deg,#5C3A28,#241710);"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></div>
        <div class="role-card__text"><h3>Reports</h3><p>Revenue and parcel statistics</p></div>
        <svg class="role-card__arrow" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>
      <a href="settings.html" class="role-card">
        <div class="role-card__icon" style="background:linear-gradient(135deg,#3A2418,#1C120C);"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg></div>
        <div class="role-card__text"><h3>Settings</h3><p>Platform configuration</p></div>
        <svg class="role-card__arrow" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </div>

    <div class="card mt-16">
      <div class="row-between">
        <div class="row"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4.2"/></svg><span>Dark mode</span></div>
        <div class="switch" id="themeSwitch"><div class="switch__knob"></div></div>
      </div>
    </div>

    <button class="btn btn-outline mt-16" style="color:var(--danger);border-color:var(--danger);" id="logoutBtn">Log Out</button>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="riders.html" data-page="riders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M5.5 17.5 9 9h4l2.5 4.5"/></svg>Riders</a>
    <a class="navlink" href="rates.html" data-page="rates.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2v20M17 6H9.5a3 3 0 0 0 0 6h5a3 3 0 0 1 0 6H6"/></svg>Rates</a>
    <a class="navlink active" href="more.html" data-page="more.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>More</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('admin');
  UI.markActiveNav();

  const themeSwitch = document.getElementById('themeSwitch');
  function syncSwitch() { themeSwitch.classList.toggle('on', document.documentElement.getAttribute('data-theme') === 'dark'); }
  syncSwitch();
  themeSwitch.addEventListener('click', () => { UI.toggleTheme(); syncSwitch(); });

  (async function () {
    const user = await Store.getUser(session.userId);
    document.getElementById('pName').textContent = user.name;
    UI.renderAvatar(document.getElementById('avatarBox'), user.name, user.photoUrl, 60);
  })();

  document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());
</script>
</body>
</html>
