<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Admin Dashboard — GO Bike Delivery</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <div class="muted" style="font-size:11px;">Dashboard</div>
      <div style="font-weight:700;font-size:15px;">GO Bike Control Center</div>
    </div>
    <button class="topbar__icon-btn" onclick="UI.toggleTheme()">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4.2"/></svg>
    </button>
  </header>

  <main class="screen">
    <div class="grid-2">
      <div class="stat"><div class="stat__value" id="statToday">0</div><div class="stat__label">Today's Orders</div></div>
      <div class="stat"><div class="stat__value" id="statCompleted">0</div><div class="stat__label">Completed Orders</div></div>
      <div class="stat"><div class="stat__value" id="statPending">0</div><div class="stat__label">Pending Orders</div></div>
      <div class="stat stat--accent"><div class="stat__value" id="statRevenue">0</div><div class="stat__label">Total Revenue (MMK)</div></div>
    </div>

    <section class="card mt-16">
      <div class="row-between mb-4"><h3 class="h3">Fleet snapshot</h3></div>
      <div class="grid-2 mt-12">
        <div><div class="muted" style="font-size:11px;">Riders online</div><div style="font-weight:800;font-size:18px;" id="ridersOnline">0</div></div>
        <div><div class="muted" style="font-size:11px;">Total riders</div><div style="font-weight:800;font-size:18px;" id="ridersTotal">0</div></div>
        <div><div class="muted" style="font-size:11px;">Total customers</div><div style="font-weight:800;font-size:18px;" id="customersTotal">0</div></div>
        <div><div class="muted" style="font-size:11px;">Cities served</div><div style="font-weight:800;font-size:18px;">7</div></div>
      </div>
    </section>

    <section class="mt-24">
      <div class="row-between mb-12">
        <h3 class="h3">Latest orders</h3>
        <a href="orders.html" class="link" style="font-size:13px;">Manage all</a>
      </div>
      <div class="stack" id="latestOrders"></div>
    </section>
  </main>

  <nav class="bottomnav">
    <a class="navlink active" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="riders.html" data-page="riders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M5.5 17.5 9 9h4l2.5 4.5"/></svg>Riders</a>
    <a class="navlink" href="rates.html" data-page="rates.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2v20M17 6H9.5a3 3 0 0 0 0 6h5a3 3 0 0 1 0 6H6"/></svg>Rates</a>
    <a class="navlink" href="more.html" data-page="more.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>More</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  UI.requireAuth('admin');
  UI.markActiveNav();

  (async function () {
    const stats = await Store.getAdminStats();
    document.getElementById('statToday').textContent = stats.todayOrders;
    document.getElementById('statCompleted').textContent = stats.completedOrders;
    document.getElementById('statPending').textContent = stats.pendingOrders;
    document.getElementById('statRevenue').textContent = stats.revenue.toLocaleString();

    const riders = await Store.listRiders();
    const customers = await Store.listUsersByRole('customer');
    document.getElementById('ridersOnline').textContent = riders.filter(r => r.status === 'online').length;
    document.getElementById('ridersTotal').textContent = riders.length;
    document.getElementById('customersTotal').textContent = customers.length;

    document.getElementById('latestOrders').innerHTML = stats.latestOrders.length ? stats.latestOrders.map(o => `
      <div class="card order-card">
        <div class="row-between">
          <span class="order-card__id">#${o.id.toUpperCase()}</span>
          ${UI.statusBadgeHtml(o.status)}
        </div>
        <div class="route-strip">
          <div class="route-strip__rail">
            <div class="route-strip__dot route-strip__dot--pickup"></div>
            <div class="route-strip__line"></div>
            <div class="route-strip__dot route-strip__dot--drop"></div>
          </div>
          <div class="route-strip__body">
            <div class="route-strip__point"><span>Pickup</span><p>${o.pickup.address}</p></div>
            <div class="route-strip__point"><span>Drop-off</span><p>${o.dropoff.address}</p></div>
          </div>
        </div>
        <div class="order-card__foot"><span class="muted">${o.city} · ${UI.timeAgo(o.createdAt)}</span><span class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</span></div>
      </div>`).join('') : `<div class="empty"><p class="muted">No orders yet.</p></div>`;
  })();
</script>
</body>
</html>
