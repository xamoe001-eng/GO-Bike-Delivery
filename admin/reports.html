<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reports — GO Bike Delivery Admin</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:14px;}
  .bar-chart__col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;}
  .bar-chart__bar{width:100%;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,var(--orange-400),var(--orange-600));min-height:4px;}
  .bar-chart__label{font-size:10px;color:var(--text-soft);font-weight:700;}
  .hbar{height:10px;border-radius:6px;background:var(--surface-alt);overflow:hidden;flex:1;}
  .hbar__fill{height:100%;background:linear-gradient(90deg,var(--orange-500),var(--orange-700));border-radius:6px;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="more.html" class="topbar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.1" fill="none"><path d="M15 6l-6 6 6 6"/></svg></a>
    <div class="topbar__title">Reports</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen screen--no-nav">
    <div class="grid-2">
      <div class="stat stat--accent"><div class="stat__value" id="totalRevenue">0</div><div class="stat__label">Total Revenue (MMK)</div></div>
      <div class="stat"><div class="stat__value" id="totalOrders">0</div><div class="stat__label">Total Orders</div></div>
      <div class="stat"><div class="stat__value" id="avgFee">0</div><div class="stat__label">Avg. Fare (MMK)</div></div>
      <div class="stat"><div class="stat__value" id="completionRate">0%</div><div class="stat__label">Completion Rate</div></div>
    </div>

    <section class="card mt-16">
      <h3 class="h3">Revenue — last 7 days</h3>
      <div class="bar-chart" id="chart"></div>
    </section>

    <section class="card mt-16">
      <h3 class="h3 mb-16">Parcel type statistics</h3>
      <div class="stack" id="parcelStats" style="gap:12px;"></div>
    </section>

    <section class="card mt-16">
      <h3 class="h3 mb-16">Orders by city</h3>
      <div class="stack" id="cityStats" style="gap:12px;"></div>
    </section>
  </main>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  UI.requireAuth('admin');

  (async function () {
    const orders = await Store.listAllOrders();
    const delivered = orders.filter(o => o.status === 'delivered');
    const revenue = delivered.reduce((s,o) => s + o.fee, 0);

    document.getElementById('totalRevenue').textContent = revenue.toLocaleString();
    document.getElementById('totalOrders').textContent = orders.length;
    document.getElementById('avgFee').textContent = delivered.length ? Math.round(revenue / delivered.length).toLocaleString() : 0;
    document.getElementById('completionRate').textContent = orders.length ? Math.round((delivered.length / orders.length) * 100) + '%' : '0%';

    // 7-day revenue chart
    const days = [...Array(7)].map((_, i) => {
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - (6 - i));
      return { date: d, label: d.toLocaleDateString('en-US', { weekday: 'short' })[0], total: 0 };
    });
    delivered.forEach(o => {
      const ev = o.timeline.find(t => t.status === 'delivered');
      if (!ev) return;
      const d = new Date(ev.at); d.setHours(0,0,0,0);
      const bucket = days.find(b => b.date.getTime() === d.getTime());
      if (bucket) bucket.total += o.fee;
    });
    const max = Math.max(...days.map(d => d.total), 1);
    document.getElementById('chart').innerHTML = days.map(d => `
      <div class="bar-chart__col">
        <div class="bar-chart__bar" style="height:${Math.max((d.total / max) * 100, 3)}%;" title="${d.total.toLocaleString()} MMK"></div>
        <div class="bar-chart__label">${d.label}</div>
      </div>`).join('');

    // Parcel type stats
    const types = {};
    orders.forEach(o => { types[o.parcelType] = (types[o.parcelType] || 0) + 1; });
    const maxType = Math.max(...Object.values(types), 1);
    document.getElementById('parcelStats').innerHTML = Object.entries(types).map(([t,c]) => `
      <div>
        <div class="row-between mb-4"><span style="font-size:13px;font-weight:600;text-transform:capitalize;">${t}</span><span class="muted" style="font-size:12px;">${c}</span></div>
        <div class="hbar"><div class="hbar__fill" style="width:${(c/maxType)*100}%;"></div></div>
      </div>`).join('') || `<p class="muted">No data yet.</p>`;

    // City stats
    const cities = {};
    orders.forEach(o => { cities[o.city] = (cities[o.city] || 0) + 1; });
    const maxCity = Math.max(...Object.values(cities), 1);
    document.getElementById('cityStats').innerHTML = Object.entries(cities).sort((a,b)=>b[1]-a[1]).map(([c,n]) => `
      <div>
        <div class="row-between mb-4"><span style="font-size:13px;font-weight:600;">${c}</span><span class="muted" style="font-size:12px;">${n}</span></div>
        <div class="hbar"><div class="hbar__fill" style="width:${(n/maxCity)*100}%;"></div></div>
      </div>`).join('') || `<p class="muted">No data yet.</p>`;
  })();
</script>
</body>
</html>
