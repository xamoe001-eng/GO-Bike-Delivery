<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Customer Management — GO Bike Delivery Admin</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="more.html" class="topbar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.1" fill="none"><path d="M15 6l-6 6 6 6"/></svg></a>
    <div class="topbar__title">Customer Management</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen screen--no-nav">
    <div class="field mb-16">
      <div class="input-icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="input" id="searchBox" placeholder="Search by name or email">
      </div>
    </div>
    <div class="stack" id="list"></div>
  </main>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  UI.requireAuth('admin');
  let customers = [];
  let allOrders = [];

  function draw(filterText = '') {
    const list = document.getElementById('list');
    const filtered = customers.filter(c =>
      c.name.toLowerCase().includes(filterText.toLowerCase()) || c.email.toLowerCase().includes(filterText.toLowerCase()));
    list.innerHTML = filtered.length ? filtered.map(c => {
      const orderCount = allOrders.filter(o => o.customerId === c.id).length;
      return `
      <div class="card row" style="gap:14px;">
        <div class="avatar-fallback" style="width:46px;height:46px;font-size:15px;">${c.name.split(' ').map(p=>p[0]).slice(0,2).join('')}</div>
        <div style="flex:1;">
          <div style="font-weight:700;">${c.name}</div>
          <div class="muted" style="font-size:12.5px;">${c.email}</div>
          <div class="muted" style="font-size:12px;">${c.phone || 'No phone on file'}</div>
        </div>
        <div class="text-right">
          <div style="font-weight:700;font-size:14px;">${orderCount}</div>
          <div class="muted" style="font-size:11px;">orders</div>
        </div>
      </div>`;
    }).join('') : `<div class="empty"><p class="muted">No customers found.</p></div>`;
  }

  document.getElementById('searchBox').addEventListener('input', (e) => draw(e.target.value));

  (async function () {
    customers = await Store.listUsersByRole('customer');
    allOrders = await Store.listAllOrders();
    draw();
  })();
</script>
</body>
</html>
