<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Settings — GO Bike Delivery Admin</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="more.html" class="topbar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.1" fill="none"><path d="M15 6l-6 6 6 6"/></svg></a>
    <div class="topbar__title">Settings</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen screen--no-nav">
    <div class="card stack" style="gap:16px;">
      <p class="eyebrow">Platform info</p>
      <div class="field"><label>Company name</label><input class="input" id="companyName" value="GO Bike Delivery"></div>
      <div class="field"><label>Support phone</label><input class="input" id="supportPhone" value="09-700-000-000"></div>
      <div class="field"><label>Support email</label><input class="input" id="supportEmail" value="support@gobike.delivery"></div>
      <div class="field">
        <label>Base currency</label>
        <select class="select input" id="currency"><option>MMK</option><option>USD</option><option>THB</option></select>
      </div>
      <button class="btn btn-dark" id="saveSettingsBtn">Save Settings</button>
    </div>

    <div class="card mt-16 stack" style="gap:14px;">
      <p class="eyebrow">Preferences</p>
      <div class="row-between">
        <span>Push notifications for new orders</span>
        <div class="switch on" id="notifSwitch"><div class="switch__knob"></div></div>
      </div>
      <div class="row-between">
        <span>Auto-assign nearest rider</span>
        <div class="switch" id="autoAssignSwitch"><div class="switch__knob"></div></div>
      </div>
      <div class="row-between">
        <span>Dark mode</span>
        <div class="switch" id="themeSwitch"><div class="switch__knob"></div></div>
      </div>
    </div>

    <div class="card mt-16" style="border-color:var(--danger);">
      <p class="eyebrow" style="color:var(--danger);">Danger zone</p>
      <p class="muted mt-8 mb-12">This clears all demo orders, users and rate cards stored in this browser. Cannot be undone.</p>
      <button class="btn btn-danger" id="resetBtn">Reset Demo Data</button>
    </div>
  </main>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  UI.requireAuth('admin');

  const themeSwitch = document.getElementById('themeSwitch');
  function syncSwitch() { themeSwitch.classList.toggle('on', document.documentElement.getAttribute('data-theme') === 'dark'); }
  syncSwitch();
  themeSwitch.addEventListener('click', () => { UI.toggleTheme(); syncSwitch(); });

  document.querySelectorAll('.switch:not(#themeSwitch)').forEach(sw => {
    sw.addEventListener('click', () => sw.classList.toggle('on'));
  });

  document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    UI.showToast('Settings saved', 'success');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('This will erase all demo data in this browser. Continue?')) {
      ['gb_users','gb_riders','gb_orders','gb_rate_cards','gb_notifications','gb_session'].forEach(k => localStorage.removeItem(k));
      UI.showToast('Demo data reset. Reloading…', 'success');
      setTimeout(() => location.href = '../index.html', 700);
    }
  });
</script>
</body>
</html>
