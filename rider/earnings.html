<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Earnings — GO Bike Delivery Rider</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:14px;}
  .bar-chart__col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;}
  .bar-chart__bar{width:100%;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,var(--orange-400),var(--orange-600));min-height:4px;}
  .bar-chart__label{font-size:10px;color:var(--text-soft);font-weight:700;}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">Earnings</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen">
    <section class="grid-2">
      <div class="stat stat--accent"><div class="stat__value" id="todayVal">0</div><div class="stat__label">Today (MMK)</div></div>
      <div class="stat"><div class="stat__value" id="weekVal">0</div><div class="stat__label">This Week (MMK)</div></div>
    </section>

    <section class="card mt-16">
      <div class="row-between"><h3 class="h3">Last 7 days</h3><span class="muted" id="weekTotalLabel"></span></div>
      <div class="bar-chart" id="chart"></div>
    </section>

    <section class="grid-2 mt-16">
      <div class="stat"><div class="stat__value" id="totalDeliveries">0</div><div class="stat__label">Total Deliveries</div></div>
      <div class="stat"><div class="stat__value" id="ratingVal">5.0</div><div class="stat__label">Rider Rating</div></div>
    </section>

    <section class="mt-24">
      <h3 class="h3 mb-12">Completed deliveries</h3>
      <div class="stack" id="historyList"></div>
    </section>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink active" href="earnings.html" data-page="earnings.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 13l2.5 2.5L16 10"/></svg>Earnings</a>
    <a class="navlink" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('rider');
  UI.markActiveNav();

  (async function () {
    const meta = await Store.getRiderMeta(session.userId);
    document.getElementById('todayVal').textContent = meta.todayEarnings.toLocaleString();
    document.getElementById('weekVal').textContent = meta.weekEarnings.toLocaleString();
    document.getElementById('totalDeliveries').textContent = meta.totalDeliveries;
    document.getElementById('ratingVal').textContent = meta.rating.toFixed(1);
    document.getElementById('weekTotalLabel').textContent = `${meta.weekEarnings.toLocaleString()} MMK`;

    const orders = (await Store.listOrdersByRider(session.userId)).filter(o => o.status === 'delivered');

    // Build a 7-day earnings bucket from delivered orders' timeline
    const days = [...Array(7)].map((_, i) => {
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - (6 - i));
      return { date: d, label: d.toLocaleDateString('en-US', { weekday: 'short' })[0], total: 0 };
    });
    orders.forEach(o => {
      const deliveredEvent = o.timeline.find(t => t.status === 'delivered');
      if (!deliveredEvent) return;
      const d = new Date(deliveredEvent.at); d.setHours(0,0,0,0);
      const bucket = days.find(b => b.date.getTime() === d.getTime());
      if (bucket) bucket.total += o.fee;
    });
    const max = Math.max(...days.map(d => d.total), 1);
    document.getElementById('chart').innerHTML = days.map(d => `
      <div class="bar-chart__col">
        <div class="bar-chart__bar" style="height:${Math.max((d.total / max) * 100, 3)}%;" title="${d.total.toLocaleString()} MMK"></div>
        <div class="bar-chart__label">${d.label}</div>
      </div>`).join('');

    const list = document.getElementById('historyList');
    list.innerHTML = orders.length ? orders.map(o => `
      <div class="card row-between">
        <div>
          <div class="order-card__id">#${o.id.toUpperCase()}</div>
          <div class="muted" style="font-size:12px;">${o.dropoff.address}</div>
        </div>
        <div class="text-right">
          <div class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</div>
          <div class="muted" style="font-size:11px;">${UI.timeAgo(o.createdAt)}</div>
        </div>
      </div>`).join('') : `<div class="empty"><p class="muted">No completed deliveries yet.</p></div>`;
  })();
</script>
</body>
</html>
