<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rider Home — GO Bike Delivery</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="row">
      <div id="avatarBox" class="avatar" style="width:38px;height:38px;"></div>
      <div>
        <div class="muted" style="font-size:11px;">Rider</div>
        <div style="font-weight:700;font-size:14px;" id="userName">—</div>
      </div>
    </div>
    <button class="topbar__icon-btn" onclick="UI.toggleTheme()">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4.2"/></svg>
    </button>
  </header>

  <main class="screen">
    <!-- Status card -->
    <section class="card card--elevated" id="statusCard" style="background:linear-gradient(150deg,var(--brown-900),var(--brown-800));color:#fff;border:none;">
      <div class="row-between">
        <div>
          <p class="eyebrow" style="color:var(--orange-400);" id="statusLabel">Offline</p>
          <h2 class="h2 mt-8">Ready to ride?</h2>
          <p class="muted" style="color:var(--brown-200);" id="statusSub">Go online to start receiving orders.</p>
        </div>
        <div class="switch" id="onlineSwitch" style="transform:scale(1.3);"><div class="switch__knob"></div></div>
      </div>
    </section>

    <!-- Stats -->
    <section class="grid-2 mt-16">
      <div class="stat stat--accent"><div class="stat__value" id="statToday">0</div><div class="stat__label">Today's Earnings (MMK)</div></div>
      <div class="stat"><div class="stat__value" id="statDeliveries">0</div><div class="stat__label">Total Deliveries</div></div>
    </section>

    <!-- Active order banner -->
    <section id="activeOrderSlot" class="mt-16"></section>

    <!-- Available orders -->
    <section class="mt-24">
      <div class="row-between mb-12">
        <h3 class="h3">Available orders</h3>
        <a href="orders.html" class="link" style="font-size:13px;">See all</a>
      </div>
      <div class="stack" id="availableList"></div>
    </section>
  </main>

  <nav class="bottomnav">
    <a class="navlink active" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="earnings.html" data-page="earnings.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 13l2.5 2.5L16 10"/></svg>Earnings</a>
    <a class="navlink" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('rider');
  UI.markActiveNav();
  const onlineSwitch = document.getElementById('onlineSwitch');

  function orderCard(o) {
    return `
    <div class="card order-card">
      <div class="row-between">
        <span class="order-card__id">#${o.id.toUpperCase()}</span>
        <span class="pill-tag">${o.parcelType} · ${o.weightKg}kg</span>
      </div>
      <div class="route-strip">
        <div class="route-strip__rail">
          <div class="route-strip__dot route-strip__dot--pickup"></div>
          <div class="route-strip__line"></div>
          <div class="route-strip__dot route-strip__dot--drop"></div>
        </div>
        <div class="route-strip__body">
          <div class="route-strip__point"><span>Pickup</span><p>${o.pickup.address}</p></div>
          <div class="route-strip__point"><span>Drop-off</span><p>${o.dropoff.address}</p></div>
        </div>
      </div>
      <div class="order-card__foot">
        <span class="muted">${o.distanceKm} km · ${o.etaMinutes} min</span>
        <span class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</span>
      </div>
      <div class="row mt-8">
        <button class="btn btn-ghost btn-sm reject-btn" data-id="${o.id}">Reject</button>
        <button class="btn btn-primary btn-sm accept-btn" data-id="${o.id}">Accept</button>
      </div>
    </div>`;
  }

  async function refresh() {
    const riderMeta = await Store.getRiderMeta(session.userId);
    const isOnline = riderMeta.status === 'online';
    onlineSwitch.classList.toggle('on', isOnline);
    document.getElementById('statusLabel').textContent = isOnline ? 'Online' : 'Offline';
    document.getElementById('statusSub').textContent = isOnline ? 'You are visible to nearby customers.' : 'Go online to start receiving orders.';
    document.getElementById('statToday').textContent = riderMeta.todayEarnings.toLocaleString();
    document.getElementById('statDeliveries').textContent = riderMeta.totalDeliveries;

    const myOrders = await Store.listOrdersByRider(session.userId);
    const active = myOrders.find(o => ['accepted','picked_up','in_transit'].includes(o.status));
    const activeSlot = document.getElementById('activeOrderSlot');
    if (active) {
      activeSlot.innerHTML = `<div class="card" style="border:1.5px solid var(--orange-500);">
        <div class="row-between mb-8"><span class="eyebrow">Active delivery</span>${UI.statusBadgeHtml(active.status)}</div>
        <a href="orders.html?active=${active.id}" class="btn btn-dark btn-sm w-full">Continue delivery</a>
      </div>`;
    } else {
      activeSlot.innerHTML = '';
    }

    const list = document.getElementById('availableList');
    if (!isOnline) {
      list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><p><strong>You're offline</strong></p><p class="muted">Go online to see nearby delivery requests.</p></div>`;
      return;
    }
    const available = await Store.listAvailableOrders();
    list.innerHTML = available.length
      ? available.slice(0, 3).map(orderCard).join('')
      : `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="4" y="7" width="16" height="13" rx="2"/></svg><p><strong>No orders right now</strong></p><p class="muted">New requests will appear here instantly.</p></div>`;

    list.querySelectorAll('.accept-btn').forEach(btn => btn.addEventListener('click', async () => {
      await Store.assignRiderToOrder(btn.dataset.id, session.userId);
      UI.showToast('Order accepted!', 'success');
      location.href = `orders.html?active=${btn.dataset.id}`;
    }));
    list.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => {
      btn.closest('.card').remove();
      UI.showToast('Order skipped');
    }));
  }

  onlineSwitch.addEventListener('click', async () => {
    const meta = await Store.getRiderMeta(session.userId);
    const next = meta.status === 'online' ? 'offline' : 'online';
    await Store.setRiderStatus(session.userId, next);
    UI.showToast(next === 'online' ? "You're online" : "You're offline");
    refresh();
  });

  (async function () {
    const user = await Store.getUser(session.userId);
    document.getElementById('userName').textContent = user.name;
    UI.renderAvatar(document.getElementById('avatarBox'), user.name, user.photoUrl, 38);
    refresh();
  })();
</script>
</body>
</html>
