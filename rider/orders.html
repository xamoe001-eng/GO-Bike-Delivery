<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Orders — GO Bike Delivery Rider</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">Orders</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen">
    <div class="segmented mb-16" id="tabs">
      <button class="active" data-t="available">Available</button>
      <button data-t="active">Active</button>
      <button data-t="history">History</button>
    </div>
    <div class="stack" id="list"></div>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink active" href="orders.html" data-page="orders.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="earnings.html" data-page="earnings.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 13l2.5 2.5L16 10"/></svg>Earnings</a>
    <a class="navlink" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('rider');
  UI.markActiveNav();
  const params = new URLSearchParams(location.search);
  let tab = params.get('active') ? 'active' : 'available';

  function routeStrip(o) {
    return `<div class="route-strip">
      <div class="route-strip__rail">
        <div class="route-strip__dot route-strip__dot--pickup"></div>
        <div class="route-strip__line"></div>
        <div class="route-strip__dot route-strip__dot--drop"></div>
      </div>
      <div class="route-strip__body">
        <div class="route-strip__point"><span>Pickup</span><p>${o.pickup.address}</p></div>
        <div class="route-strip__point"><span>Drop-off</span><p>${o.dropoff.address}</p></div>
      </div>
    </div>`;
  }

  function gmapsUrl(o) {
    return `https://www.google.com/maps/dir/?api=1&origin=${o.pickup.lat},${o.pickup.lng}&destination=${o.dropoff.lat},${o.dropoff.lng}&travelmode=two-wheeler`;
  }

  async function drawAvailable() {
    const orders = await Store.listAvailableOrders();
    const list = document.getElementById('list');
    if (orders.length === 0) {
      list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="4" y="7" width="16" height="13" rx="2"/></svg><p><strong>No orders available</strong></p><p class="muted">Check back shortly — new requests come in fast.</p></div>`;
      return;
    }
    list.innerHTML = orders.map(o => `
      <div class="card order-card">
        <div class="row-between"><span class="order-card__id">#${o.id.toUpperCase()}</span><span class="pill-tag">${o.parcelType} · ${o.weightKg}kg</span></div>
        ${routeStrip(o)}
        <div class="order-card__foot"><span class="muted">${o.distanceKm} km · ${o.etaMinutes} min</span><span class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</span></div>
        <div class="row mt-8">
          <button class="btn btn-ghost btn-sm reject-btn" data-id="${o.id}">Reject</button>
          <button class="btn btn-primary btn-sm accept-btn" data-id="${o.id}">Accept</button>
        </div>
      </div>`).join('');
    list.querySelectorAll('.accept-btn').forEach(btn => btn.addEventListener('click', async () => {
      await Store.assignRiderToOrder(btn.dataset.id, session.userId);
      UI.showToast('Order accepted!', 'success');
      tab = 'active';
      syncTabs();
      draw();
    }));
    list.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => { btn.closest('.card').remove(); UI.showToast('Order skipped'); }));
  }

  async function drawActive() {
    const mine = await Store.listOrdersByRider(session.userId);
    const active = mine.find(o => ['accepted', 'picked_up', 'in_transit'].includes(o.status));
    const list = document.getElementById('list');
    if (!active) {
      list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.4"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg><p><strong>No active delivery</strong></p><p class="muted">Accept an order to start a trip.</p></div>`;
      return;
    }
    const nextAction = {
      accepted: { label: 'Confirm Pickup', next: 'picked_up' },
      picked_up: { label: 'Start Trip (In Transit)', next: 'in_transit' },
      in_transit: { label: 'Confirm Delivered', next: 'delivered' }
    }[active.status];

    list.innerHTML = `
      <div class="card" style="border:1.5px solid var(--orange-500);">
        <div class="row-between mb-8"><span class="order-card__id">#${active.id.toUpperCase()}</span>${UI.statusBadgeHtml(active.status)}</div>
        ${routeStrip(active)}
        <div class="order-card__foot"><span class="muted">${active.distanceKm} km · ${active.parcelType}, ${active.weightKg}kg</span><span class="order-card__price">${FeeCalc.formatCurrency(active.fee)}</span></div>
        ${active.note ? `<p class="muted mt-8">Note: ${active.note}</p>` : ''}
        <div class="stack mt-16" style="gap:10px;">
          <a href="${gmapsUrl(active)}" target="_blank" rel="noopener" class="btn btn-dark">
            <svg width="17" height="17" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M21 10c0 6-9 12-9 12S3 16 3 10a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            Open Google Maps Navigation
          </a>
          ${nextAction ? `<button class="btn btn-primary" id="advanceBtn" data-next="${nextAction.next}" data-id="${active.id}" data-fee="${active.fee}">${nextAction.label}</button>` : ''}
        </div>
      </div>`;

    const advanceBtn = document.getElementById('advanceBtn');
    if (advanceBtn) advanceBtn.addEventListener('click', async () => {
      const nextStatus = advanceBtn.dataset.next;
      await Store.updateOrderStatus(advanceBtn.dataset.id, nextStatus);
      if (nextStatus === 'delivered') {
        await Store.creditRiderEarnings(session.userId, parseFloat(advanceBtn.dataset.fee));
        UI.showToast('Delivered! Earnings updated.', 'success');
      } else {
        UI.showToast('Status updated', 'success');
      }
      draw();
    });
  }

  async function drawHistory() {
    const mine = await Store.listOrdersByRider(session.userId);
    const done = mine.filter(o => ['delivered', 'cancelled'].includes(o.status));
    const list = document.getElementById('list');
    if (done.length === 0) {
      list.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="4" y="7" width="16" height="13" rx="2"/></svg><p><strong>No delivery history yet</strong></p></div>`;
      return;
    }
    list.innerHTML = done.map(o => `
      <div class="card order-card">
        <div class="row-between"><span class="order-card__id">#${o.id.toUpperCase()}</span>${UI.statusBadgeHtml(o.status)}</div>
        ${routeStrip(o)}
        <div class="order-card__foot"><span class="muted">${UI.timeAgo(o.createdAt)}</span><span class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</span></div>
      </div>`).join('');
  }

  function syncTabs() {
    document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.t === tab));
  }
  function draw() {
    if (tab === 'available') drawAvailable();
    else if (tab === 'active') drawActive();
    else drawHistory();
  }

  document.getElementById('tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button'); if (!btn) return;
    tab = btn.dataset.t; syncTabs(); draw();
  });

  syncTabs();
  draw();
</script>
</body>
</html>
