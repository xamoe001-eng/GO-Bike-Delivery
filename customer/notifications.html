<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Notifications — GO Bike Delivery</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">Notifications</div>
    <button class="topbar__icon-btn" id="clearBtn" title="Mark all as read">
      <svg width="17" height="17" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
  </header>

  <main class="screen">
    <div class="stack" id="list"></div>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="order-history.html" data-page="order-history.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink active" href="notifications.html" data-page="notifications.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>Alerts</a>
    <a class="navlink" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('customer');
  UI.markActiveNav();

  (async function () {
    const notifs = await Store.listNotifications(session.userId);
    const list = document.getElementById('list');
    if (notifs.length === 0) {
      list.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" stroke-width="1.4"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
        <p><strong>You're all caught up</strong></p><p class="muted">New order updates will appear here.</p></div>`;
      return;
    }
    list.innerHTML = notifs.map(n => `
      <div class="card" style="opacity:${n.read ? '.6' : '1'};">
        <div class="row" style="align-items:flex-start;">
          <div class="btn-icon" style="background:var(--orange-100);flex:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--orange-600)" stroke-width="1.9" fill="none"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/></svg>
          </div>
          <div style="flex:1;">
            <div class="row-between"><span style="font-weight:700;font-size:14px;">${n.title}</span><span class="muted" style="font-size:11px;">${UI.timeAgo(n.createdAt)}</span></div>
            <p class="muted mt-8" style="font-size:13px;">${n.body}</p>
          </div>
        </div>
      </div>`).join('');
    await Store.markAllNotificationsRead(session.userId);
  })();

  document.getElementById('clearBtn').addEventListener('click', async () => {
    await Store.markAllNotificationsRead(session.userId);
    UI.showToast('All notifications marked as read');
    document.querySelectorAll('#list .card').forEach(c => c.style.opacity = '.6');
  });
</script>
</body>
</html>
