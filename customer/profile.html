<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profile — GO Bike Delivery</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar__title">Profile</div>
    <div style="width:40px;"></div>
  </header>

  <main class="screen">
    <div class="card center" style="flex-direction:column;padding:26px;">
      <div id="avatarBox" class="avatar" style="width:72px;height:72px;font-size:26px;margin-bottom:12px;"></div>
      <div class="h3" id="pName">—</div>
      <div class="muted" id="pEmail">—</div>
      <span class="pill-tag mt-12">Customer</span>
    </div>

    <div class="card mt-16 stack" style="gap:16px;">
      <div class="field"><label>Full name</label><input class="input" id="editName"></div>
      <div class="field"><label>Phone number</label><input class="input" id="editPhone"></div>
      <button class="btn btn-dark" id="saveBtn">Save Changes</button>
    </div>

    <div class="card mt-16">
      <div class="row-between">
        <div class="row"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4.2"/></svg><span>Dark mode</span></div>
        <div class="switch" id="themeSwitch"><div class="switch__knob"></div></div>
      </div>
    </div>

    <button class="btn btn-outline mt-16" style="color:var(--danger);border-color:var(--danger);" id="logoutBtn">Log Out</button>
  </main>

  <nav class="bottomnav">
    <a class="navlink" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="order-history.html" data-page="order-history.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="notifications.html" data-page="notifications.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>Alerts</a>
    <a class="navlink active" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('customer');
  UI.markActiveNav();

  const themeSwitch = document.getElementById('themeSwitch');
  function syncSwitch() { themeSwitch.classList.toggle('on', document.documentElement.getAttribute('data-theme') === 'dark'); }
  syncSwitch();
  themeSwitch.addEventListener('click', () => { UI.toggleTheme(); syncSwitch(); });

  (async function () {
    const user = await Store.getUser(session.userId);
    document.getElementById('pName').textContent = user.name;
    document.getElementById('pEmail').textContent = user.email;
    document.getElementById('editName').value = user.name;
    document.getElementById('editPhone').value = user.phone || '';
    UI.renderAvatar(document.getElementById('avatarBox'), user.name, user.photoUrl, 72);
  })();

  document.getElementById('saveBtn').addEventListener('click', async () => {
    await Store.updateUser(session.userId, {
      name: document.getElementById('editName').value.trim(),
      phone: document.getElementById('editPhone').value.trim()
    });
    UI.showToast('Profile updated', 'success');
  });

  document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());
</script>
</body>
</html>
