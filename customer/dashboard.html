<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Home — GO Bike Delivery</title>
<meta name="theme-color" content="#1C120C">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../assets/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="row">
      <div id="avatarBox" class="avatar" style="width:38px;height:38px;"></div>
      <div>
        <div class="muted" style="font-size:11px;">Good day,</div>
        <div style="font-weight:700;font-size:14px;" id="userName">—</div>
      </div>
    </div>
    <div class="topbar__actions">
      <button class="topbar__icon-btn" onclick="UI.toggleTheme()">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/><circle cx="12" cy="12" r="4.2"/></svg>
      </button>
      <a href="notifications.html" class="topbar__icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9" fill="none"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
      </a>
    </div>
  </header>

  <main class="screen">
    <!-- Hero booking prompt -->
    <section class="card card--elevated" style="background:linear-gradient(150deg,var(--brown-900),var(--brown-800) 60%,var(--orange-700) 140%);color:#fff;border:none;">
      <p class="eyebrow" style="color:var(--orange-400);">Book a delivery</p>
      <h2 class="h2" style="margin:6px 0 4px;">Where's it going today?</h2>
      <p class="muted" style="color:var(--brown-200);margin-bottom:16px;">Get a rider to pick up and drop off in one trip.</p>
      <a href="create-order.html" class="btn btn-primary" style="background:#fff;color:var(--orange-700);box-shadow:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.3" fill="none"><path d="M12 5v14M5 12h14"/></svg>
        New Delivery
      </a>
    </section>

    <!-- Stats -->
    <section class="grid-3 mt-16">
      <div class="stat"><div class="stat__value" id="statActive">0</div><div class="stat__label">Active</div></div>
      <div class="stat"><div class="stat__value" id="statDelivered">0</div><div class="stat__label">Delivered</div></div>
      <div class="stat"><div class="stat__value" id="statSpent">0</div><div class="stat__label">Total Spent</div></div>
    </section>

    <!-- Recent orders -->
    <section class="mt-24">
      <div class="row-between mb-12">
        <h3 class="h3">Recent orders</h3>
        <a href="order-history.html" class="link" style="font-size:13px;">See all</a>
      </div>
      <div class="stack" id="recentOrders"></div>
    </section>
  </main>

  <a href="create-order.html" class="fab" aria-label="New delivery">
    <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
  </a>

  <nav class="bottomnav">
    <a class="navlink active" href="dashboard.html" data-page="dashboard.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a class="navlink" href="order-history.html" data-page="order-history.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>Orders</a>
    <a class="navlink" href="notifications.html" data-page="notifications.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>Alerts</a>
    <a class="navlink" href="profile.html" data-page="profile.html">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>Profile</a>
  </nav>
</div>

<script src="../js/firebase.js"></script>
<script src="../js/store.js"></script>
<script src="../js/fee-calculator.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/seed.js"></script>
<script>
  const session = UI.requireAuth('customer');
  UI.markActiveNav();

  (async function init() {
    const user = await Store.getUser(session.userId);
    document.getElementById('userName').textContent = user.name;
    UI.renderAvatar(document.getElementById('avatarBox'), user.name, user.photoUrl, 38);

    const orders = await Store.listOrdersByCustomer(session.userId);
    const active = orders.filter(o => ['pending','accepted','picked_up','in_transit'].includes(o.status));
    const delivered = orders.filter(o => o.status === 'delivered');
    const spent = delivered.reduce((s,o) => s + (o.fee || 0), 0);

    document.getElementById('statActive').textContent = active.length;
    document.getElementById('statDelivered').textContent = delivered.length;
    document.getElementById('statSpent').textContent = spent >= 1000 ? (spent/1000).toFixed(1)+'k' : spent;

    const list = document.getElementById('recentOrders');
    if (orders.length === 0) {
      list.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="4" y="7" width="16" height="13" rx="2"/><path d="M9 7V5a3 3 0 0 1 6 0v2"/></svg>
        <p><strong>No orders yet</strong></p><p class="muted">Tap "New Delivery" to send your first parcel.</p></div>`;
    } else {
      list.innerHTML = orders.slice(0,4).map(orderCard).join('');
    }
  })();

  function orderCard(o) {
    return `
    <a href="track-order.html?id=${o.id}" class="card order-card">
      <div class="row-between">
        <span class="order-card__id">#${o.id.toUpperCase()}</span>
        ${UI.statusBadgeHtml(o.status)}
      </div>
      <div class="route-strip">
        <div class="route-strip__rail">
          <div class="route-strip__dot route-strip__dot--pickup"></div>
          <div class="route-strip__line"></div>
          <div class="route-strip__dot route-strip__dot--drop"></div>
        </div>
        <div class="route-strip__body">
          <div class="route-strip__point"><span>Pickup</span><p>${o.pickup.address}</p></div>
          <div class="route-strip__point"><span>Drop-off</span><p>${o.dropoff.address}</p></div>
        </div>
      </div>
      <div class="order-card__foot">
        <span class="muted">${UI.timeAgo(o.createdAt)} · ${o.weightKg} kg</span>
        <span class="order-card__price">${FeeCalc.formatCurrency(o.fee)}</span>
      </div>
    </a>`;
  }
</script>
</body>
</html>
